<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hỏi nhẹ thôi...</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: Arial;
  display: flex; 
  justify-content: center;
  align-items: center;
  background: linear-gradient(45deg, #ff9a9e, #fad0c4);
  overflow: hidden;
}

/* Màn hỏi */
#question {
  text-align: center;
  color: white;
  animation: fadeIn 1s ease;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#yes { background: #00ffcc; }
#no { background: #ff4d4d; }

/* Màn lag */
#loading {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: lime;
  font-family: monospace;
  padding: 20px;
  animation: flicker 0.1s infinite;
}

@keyframes flicker {
  0% {opacity: 1;}
  50% {opacity: 0.3;}
  100% {opacity: 1;}
}

/* Màn troll */
#prank {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  justify-content: center;
  align-items: center;
  text-align: center;
  flex-direction: column;
  filter: blur(1px);
  
  animation: bwFlicker 2s infinite;
}

/* Text animation */
#message {
  font-size: 35px;
  animation: bounce 1s infinite alternate;
}

@keyframes bounce {
  from {transform: scale(1);}
  to {transform: scale(1.1);}
}

/* Rung */
@keyframes shake {
  0% {transform: translate(0);}
  25% {transform: translate(5px, -5px);}
  50% {transform: translate(-5px, 5px);}
  75% {transform: translate(5px, 5px);}
  100% {transform: translate(0);}
}

 @keyframes bwFlicker {
  0% { background: black; }
  20% { background: #111; }
  40% { background: white; }
  60% { background: #222; }
  80% { background: black; }
  100% { background: white; }
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>
</head>

<body>

<!-- Câu hỏi -->
<div id="question">
  <h1>Mọi người có muốn biết bí mật của Hà khônggg?</h1>
  <button onclick="yesClick()">Có</button>
  <button onclick="noClick()">Không</button>
  <p id="noText"></p>
</div>

<!-- Màn lag -->
<div id="loading">
  <p id="loadingText">Đang tải dữ liệu...</p>
</div>

<!-- Troll -->
<div id="prank">
  <h1 id="message"></h1>
</div>

<script>
function noClick() {
  document.getElementById("noText").innerHTML = "Không nghe thì thôiiiii, dỗiiiii";
}

function yesClick() {
  document.getElementById("question").style.display = "none";
  document.getElementById("loading").style.display = "block";

  let percent = 0;
  const loadingText = document.getElementById("loadingText");

  const interval = setInterval(() => {
    percent++;
    loadingText.innerHTML = "Đang xử lý... " + percent + "%";

    if (percent >= 100) {
      clearInterval(interval);
    }
  }, 1200);


  setTimeout(() => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("prank").style.display = "flex";

    document.body.style.animation = "shake 0.3s";

    typeText("Ú òa bị lừa rồi nha!\nChúc mọi người 1/4 vui vẻee");
  }, 120000); 
}

function typeText(text) {
  let i = 0;
  const msg = document.getElementById("message");

  function typing() {
    if (i < text.length) {
      msg.innerHTML += text.charAt(i) === "\n" ? "<br>" : text.charAt(i);
      i++;
      setTimeout(typing, 50);
    }
  }

  typing();
}
</script>

</body>
</html>
